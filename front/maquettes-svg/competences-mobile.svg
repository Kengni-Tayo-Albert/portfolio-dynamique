  <defs><style>.bg{fill:#07111f}.soft{fill:#0b1424}.panel{fill:#0f172a;stroke:#31445f}.text{fill:#fff;font-family:Inter,Arial,sans-serif}.muted{fill:#cbd5e1;font-family:Inter,Arial,sans-serif}.blue{fill:#3b82f6}.green{fill:#22c55e}.purple{fill:#8b5cf6}.orange{fill:#f97316}.h1{font-size:32px;font-weight:900}.h2{font-size:23px;font-weight:800}.body{font-size:16px}.small{font-size:13px}</style></defs>
